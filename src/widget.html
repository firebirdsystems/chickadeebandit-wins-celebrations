<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wins & Celebrations Widget</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--hub-font, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: 13px;
      background: #fff;
      color: #111827;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header { display: flex; align-items: center; gap: 6px; padding: 10px 14px 8px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
    .header-icon { font-size: 14px; }
    .header-title { font-size: 12px; font-weight: 600; color: #374151; flex: 1; }
    .header-link { font-size: 11px; color: #6366f1; text-decoration: none; }
    .header-link:hover { text-decoration: underline; }

    .content { flex: 1; padding: 10px 14px 12px; display: flex; flex-direction: column; gap: 6px; overflow: hidden; }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: #9ca3af;
      text-align: center;
    }
    .empty .icon { font-size: 1.8rem; }
    .empty p { font-size: 12px; }

    .win-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .win-row:last-child { border-bottom: none; }

    .win-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: #fff;
      flex-shrink: 0;
    }
    .win-body { flex: 1; overflow: hidden; }
    .win-title { font-weight: 500; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .win-meta { font-size: 11px; color: #9ca3af; }
    .win-category { font-size: 1.1rem; flex-shrink: 0; }
  </style>
</head>
<body>

<div class="header">
  <span class="header-icon">🏆</span>
  <span class="header-title">Wins</span>
  <a class="header-link" href="/run/wins-celebrations">Open</a>
</div>

<div class="content" id="content">
  <div class="empty">
    <span class="icon">🏆</span>
    <p>No wins yet</p>
  </div>
</div>

<script type="module">
import { esc, memberColor, initial, formatRelativeDate } from "/hub-sdk.js";

const DB      = window.__DB_URL      ?? "";
const CONTEXT = window.__CONTEXT_URL ?? "";

const CATEGORY_ICONS = { grade: "📝", goal: "🎯", milestone: "🌟", other: "🎉" };

async function db(sql, params = []) {
  if (!DB) return { rows: [] };
  const res = await fetch(DB, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ sql, params }),
  });
  return res.json();
}

async function init() {
  let members = [];
  if (CONTEXT) {
    try {
      const res = await fetch(`${CONTEXT}?keys=family.members`);
      members = ((await res.json())["family.members"]) ?? [];
    } catch {}
  }
  const memberMap = new Map(members.map(m => [m.id, m]));

  const { rows: wins } = await db(`
    SELECT id, author_id, title, category, created_at
    FROM wins
    WHERE household_id = current_setting('app.household_id', true)::uuid
    ORDER BY created_at DESC
    LIMIT 4
  `);
  if (!wins.length) return;

  const content = document.getElementById("content");
  content.innerHTML = wins.map(w => {
    const author = memberMap.get(w.author_id);
    const name = author?.name ?? "Someone";
    const color = memberColor(w.author_id);
    return `
      <div class="win-row">
        <span class="win-avatar" style="background:${color}">${esc(initial(name))}</span>
        <div class="win-body">
          <div class="win-title">${esc(w.title)}</div>
          <div class="win-meta">${esc(name)} · ${esc(formatRelativeDate(w.created_at))}</div>
        </div>
        <span class="win-category">${CATEGORY_ICONS[w.category] || "🎉"}</span>
      </div>
    `;
  }).join("");
}

init();
</script>
</body>
</html>
